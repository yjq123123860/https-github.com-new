<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岭南万象 - 二维码</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d0d0d;font-family:'Inter','PingFang SC',sans-serif}
  .card{text-align:center;padding:48px 40px;background:linear-gradient(180deg,#1a1a1a 0%,#0f0f0f 100%);border:1px solid rgba(212,175,55,.3);border-radius:4px}
  h2{font-family:'Noto Serif SC',serif;color:#D4AF37;font-size:24px;font-weight:600;letter-spacing:.08em;margin:0 0 6px}
  .sub{color:rgba(212,175,55,.5);font-size:10px;letter-spacing:.15em;margin:0 0 24px}
  .qr-wrap{display:inline-block;padding:12px;background:#fff;border-radius:4px}
  img{display:block;width:220px;height:220px}
  .url{color:rgba(255,255,255,.35);font-size:10px;margin-top:20px;letter-spacing:.04em;word-break:break-all}
  .line{width:40px;height:1px;background:#D4AF37;margin:16px auto 0;opacity:.4}
</style>
</head>
<body>
<div class="card">
  <h2>岭南万象</h2>
  <div class="sub">LINGNAN PANORAMA</div>
  <div class="qr-wrap">
    <img src="qr-code.png" alt="QR Code">
  </div>
  <div class="line"></div>
  <div class="url">扫描二维码打开网站</div>
</div>
</body>
</html>
